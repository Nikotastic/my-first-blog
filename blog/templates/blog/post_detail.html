{% extends 'blog/base.html' %} {% block content %}
<div class="post">
  {% if post.published_date %}
  <div class="date">{{ post.published_date }}</div>
  {% endif %}
  <h2>{{ post.title }}</h2>
  <p>{{ post.text|linebreaksbr }}</p>

  <div class="post-actions">
    <a href="{% url 'post_edit' pk=post.pk %}" class="btn btn-edit">
    Editar
    </a>
    <a href="{% url 'post_delete' pk=post.pk %}" class="btn btn-delete">
      Eliminar
    </a>
  </div>
</div>

<style>
  .post-actions {
    display: flex;
    gap: 10px;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #ddd;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 4px;
    text-decoration: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s ease;
    display: inline-block;
  }

  .btn-edit {
    background: #0275d8;
    color: white;
  }

  .btn-edit:hover {
    background: #0251cc;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  }

  .btn-delete {
    background: #d9534f;
    color: white;
  }

  .btn-delete:hover {
    background: #c9302c;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  }
</style>
{% endblock %}
