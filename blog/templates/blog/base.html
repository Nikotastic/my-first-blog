<html>
  <head>
    <title>Django blog</title>
    <link
      rel="stylesheet"
      href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap-theme.min.css"
    />
    <link
      href="//fonts.googleapis.com/css?family=Lobster&subset=latin,latin-ext"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      .page-header {
        background-color: #c25100;
        margin-top: 0;
        padding: 20px 20px 20px 40px;
      }

      .page-header h1,
      .page-header h1 a,
      .page-header h1 a:visited,
      .page-header h1 a:active {
        color: #ffffff;
        font-size: 36pt;
        text-decoration: none;
      }

      .content {
        margin-left: 40px;
      }

      h1,
      h2,
      h3,
      h4 {
        font-family: "Lobster", cursive;
      }
      a {
        text-decoration: none !important;
      }

      .date {
        color: #828282;
      }

      .save {
        float: right;
      }

      .post-form textarea,
      .post-form input {
        width: 100%;
      }

      .top-menu {
        color: #ffffff;
        font-size: 18px;
        font-weight: bold;
        position: absolute;
        top: 30px;
        right: 30px;
        padding: 18px 35px;
        background: #28a745;
        border-radius: 5px;
      }

      .top-menu:hover {
        background: #28a745;
      }

      .top-menu:visited {
        color: #ffffff;
      }

      .post h2 a,
      .post h2 a:visited {
        color: #000000;
      }
    </style>
  </head>

  <body>
    <div class="page-header">
      {% if user.is_authenticated %}
      <a href="{% url 'post_new' %}" class="top-menu">+ Crear nuevo</a>
      {% endif %}
      <h1><a href="/">Django Blog</a></h1>
    </div>
    <div class="content container">
      <div class="row">
        <div class="col-md-8">{% block content %} {% endblock %}</div>
      </div>
    </div>
  </body>
</html>
